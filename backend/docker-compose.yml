services:
  api:
    build:
      context: .
      dockerfile: src/MyMemo.Api/Dockerfile
    ports:
      - "5151:8080"
    env_file:
      - .env
    depends_on:
      - azurite
    volumes:
      - dbdata:/data

  worker:
    build:
      context: .
      dockerfile: src/MyMemo.Worker/Dockerfile
    env_file:
      - .env
    depends_on:
      - azurite
    volumes:
      - dbdata:/data

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command: azurite --skipApiVersionCheck --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"

volumes:
  dbdata:

services:
  api:
    build:
      context: .
      dockerfile: src/MyMemo.Api/Dockerfile
    ports:
      - "5000:8080"
    env_file:
      - .env
    depends_on:
      - azurite

  worker:
    build:
      context: .
      dockerfile: src/MyMemo.Worker/Dockerfile
    env_file:
      - .env
    depends_on:
      - azurite

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
